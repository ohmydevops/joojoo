<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Joojoo</title>
    <link href="style.css" rel="stylesheet" type="text/css">
</head>
<body>
    <main>
        <div class="container">
            <header>
                <h1>Joojoo</h1>
                <p class="subtitle">A minimal PHP web server</p>
            </header>

            <section class="stats">
                <div class="stat">Single PHP file</div>
                <div class="stat">Multi-process</div>
                <div class="stat">Keep-Alive</div>
            </section>

            <section class="http-features">
                <h2>HTTP Features</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Feature</th>
                            <th>Supported</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>HTTP/1.1</td>
                            <td class="yes">✓</td>
                        </tr>
                        <tr>
                            <td>Keep-Alive</td>
                            <td class="yes">✓</td>
                        </tr>
                        <tr>
                            <td>Static Files</td>
                            <td class="yes">✓</td>
                        </tr>
                        <tr>
                            <td>MIME Types</td>
                            <td class="yes">✓</td>
                        </tr>
                        <tr>
                            <td>Multi-Process</td>
                            <td class="yes">✓</td>
                        </tr>
                        <tr>
                            <td>Custom 404</td>
                            <td class="yes">✓</td>
                        </tr>
                        <tr>
                            <td>HTTPS/TLS</td>
                            <td class="no">✗</td>
                        </tr>
                        <tr>
                            <td>HTTP/2</td>
                            <td class="no">✗</td>
                        </tr>
                        <tr>
                            <td>Compression</td>
                            <td class="no">✗</td>
                        </tr>
                        <tr>
                            <td>CGI/FastCGI</td>
                            <td class="no">✗</td>
                        </tr>
                        <tr>
                            <td>Virtual Hosts</td>
                            <td class="no">✗</td>
                        </tr>
                        <tr>
                            <td>Authentication</td>
                            <td class="no">✗</td>
                        </tr>
                    </tbody>
                </table>
            </section>

            <section class="test">
                <button id="testBtn">Test Connection</button>
                <p class="result" id="result"></p>
            </section>

            <footer>
                <p>Made with PHP</p>
            </footer>
        </div>
    </main>

    <script src="index.js"></script>
</body>
</html>
